<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Action Plan: Geopolitics Visualization</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --border: #30363d;
            --accent: #58a6ff;
            --danger: #f85149;
            --resource: #d299ff;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --success: #3fb950;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 30px 20px;
            border-bottom: 1px solid var(--border);
        }

        h1 { margin: 0; font-size: 1.8rem; color: var(--accent); }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
            box-sizing: border-box;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .viz-card { flex: 1 1 600px; min-width: 300px; }
        .control-card { flex: 1 1 350px; min-width: 300px; }

        #canvas-wrapper {
            background: #05070a;
            border-radius: 8px;
            height: 450px;
            position: relative;
        }

        /* フルスクリーン・インフォグラフィック・モーダル */
        #fs-modal {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        #fs-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: #1c2128;
            border: 1px solid var(--border);
            border-radius: 24px;
            width: 90%;
            max-width: 650px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            transform: translateY(40px) scale(0.95);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            box-sizing: border-box;
        }

        #fs-modal.active .modal-content {
            transform: translateY(0) scale(1);
        }

        .close-btn {
            position: absolute;
            top: 20px; right: 20px;
            background: none; border: none;
            color: var(--text-dim); font-size: 24px; cursor: pointer;
            transition: color 0.2s;
        }
        .close-btn:hover { color: white; }

        .info-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .info-icon { width: 16px; height: 16px; border-radius: 50%; }
        .info-title { font-size: 1.8rem; font-weight: bold; margin: 0; }
        .info-desc { font-size: 1.05rem; line-height: 1.6; color: #adbac7; margin-bottom: 30px; }
        
        .graphic-container {
            background: #22272e;
            border-radius: 14px;
            padding: 20px;
            border: 1px solid #373e47;
        }

        .data-row { margin-bottom: 20px; }
        .data-row:last-child { margin-bottom: 0; }
        .data-label { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 5px; display: flex; justify-content: space-between; align-items: flex-end; }
        .bar-bg { background: #2d333b; height: 12px; border-radius: 6px; overflow: hidden; margin-bottom: 6px; }
        .bar-fill { height: 100%; width: 0; transition: width 1s cubic-bezier(0.16, 1, 0.3, 1); }
        
        /* エビデンスのリンクスタイル */
        .source-link {
            font-size: 0.75rem;
            color: var(--accent);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .source-link:hover { text-decoration: underline; }

        /* シミュレーターUI */
        .price-box {
            background: #0d1117;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            text-align: center;
        }
        .jpy-price { display: block; font-size: 2rem; font-weight: bold; color: var(--success); margin-top: 5px; }
        .usd-price { color: var(--text-dim); font-size: 1rem; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--accent); }
        .node-label { fill: #fff; font-size: 15px; font-weight: bold; pointer-events: none; text-anchor: middle; }
    </style>
</head>
<body>

    <div id="fs-modal">
        <div class="modal-content">
            <button class="close-btn" id="modal-close">×</button>
            <div class="info-header">
                <div class="info-icon" id="info-dot"></div>
                <h2 class="info-title" id="info-title">要素名</h2>
            </div>
            <p class="info-desc" id="info-desc">説明文</p>
            
            <div class="graphic-container" id="graphic-area">
                </div>
        </div>
    </div>

    <header>
        <h1>Geopolitical Risk Analysis</h1>
        <p style="color: var(--text-dim); margin: 5px 0 0 0;">UNIT1: 権力・力・資源の構造動態</p>
    </header>

    <main class="container">
        <div class="card viz-card">
            <h3>因果構造：三すくみの関係</h3>
            <div id="canvas-wrapper">
                <svg id="viz-canvas" width="100%" height="100%"></svg>
            </div>
            <p style="font-size: 0.85rem; color: var(--accent); text-align: center; margin-top: 15px;">要素をクリックするとフルスクリーンでデータを展開</p>
        </div>

        <div class="card control-card">
            <h3>Hormuz Simulation</h3>
            <label>地政学的緊張度: <span id="risk-display">0</span>%</label>
            <input type="range" id="risk-slider" value="0" min="0" max="100">
            
            <div class="price-box">
                <span class="usd-price">予測価格 (USD): <span id="oil-usd">$80.00</span></span>
                <span class="jpy-price" id="oil-jpy">¥12,400</span>
                <small style="color: var(--text-dim);">※1ドル=155円換算</small>
            </div>

            <div style="height: 200px;">
                <canvas id="impactChart"></canvas>
            </div>
        </div>
    </main>

    <script>
        window.onload = function() {
            const EX_RATE = 155;
