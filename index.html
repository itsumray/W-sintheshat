<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Action Plan: Geopolitics Visualization</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --border: #30363d;
            --accent: #58a6ff;
            --danger: #f85149;
            --resource: #d299ff;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --success: #3fb950;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 30px 20px;
            border-bottom: 1px solid var(--border);
        }

        h1 { margin: 0; font-size: 1.8rem; color: var(--accent); }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
            box-sizing: border-box;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .viz-card { flex: 1 1 600px; min-width: 300px; }
        .control-card { flex: 1 1 350px; min-width: 300px; }

        #canvas-wrapper {
            background: #05070a;
            border-radius: 8px;
            height: 450px;
            position: relative;
        }

        /* 🔥 フルスクリーン・インフォグラフィック・モーダル */
        #fs-modal {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        #fs-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: #1c2128;
            border: 1px solid var(--border);
            border-radius: 24px;
            width: 90%;
            max-width: 650px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            transform: translateY(40px) scale(0.95);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            box-sizing: border-box;
        }

        #fs-modal.active .modal-content {
            transform: translateY(0) scale(1);
        }

        .close-btn {
            position: absolute;
            top: 20px; right: 20px;
            background: none; border: none;
            color: var(--text-dim); font-size: 24px; cursor: pointer;
            transition: color 0.2s;
        }
        .close-btn:hover { color: white; }

        /* インフォグラフィックUIパーツ */
        .info-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .info-icon { width: 16px; height: 16px; border-radius: 50%; }
        .info-title { font-size: 1.8rem; font-weight: bold; margin: 0; }
        .info-desc { font-size: 1.05rem; line-height: 1.6; color: #adbac7; margin-bottom: 30px; }
        
        .graphic-container {
            background: #22272e;
            border-radius: 14px;
            padding: 20px;
            border: 1px solid #373e47;
        }

        .data-row { margin-bottom: 15px; }
        .data-label { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 5px; display: flex; justify-content: space-between; }
        .bar-bg { background: #2d333b; height: 12px; border-radius: 6px; overflow: hidden; }
        .bar-fill { height: 100%; width: 0; transition: width 1s cubic-bezier(0.16, 1, 0.3, 1); }

        /* シミュレーターUI */
        .price-box {
            background: #0d1117;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            text-align: center;
        }
        .jpy-price { display: block; font-size: 2rem; font-weight: bold; color: var(--success); margin-top: 5px; }
        .usd-price { color: var(--text-dim); font-size: 1rem; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--accent); }
        .node-label { fill: #fff; font-size: 15px; font-weight: bold; pointer-events: none; text-anchor: middle; }
    </style>
</head>
<body>

    <div id="fs-modal">
        <div class="modal-content">
            <button class="close-btn" id="modal-close">×</button>
            <div class="info-header">
                <div class="info-icon" id="info-dot"></div>
                <h2 class="info-title" id="info-title">要素名</h2>
            </div>
            <p class="info-desc" id="info-desc">説明文</p>
            
            <div class="graphic-container" id="graphic-area">
                </div>
        </div>
    </div>

    <header>
        <h1>Geopolitical Risk Analysis</h1>
        <p style="color: var(--text-dim); margin: 5px 0 0 0;">UNIT1: 権力・力・資源の構造動態</p>
    </header>

    <main class="container">
        <div class="card viz-card">
            <h3>因果構造：三すくみの関係</h3>
            <div id="canvas-wrapper">
                <svg id="viz-canvas" width="100%" height="100%"></svg>
            </div>
            <p style="font-size: 0.85rem; color: var(--accent); text-align: center; margin-top: 15px;">要素をクリックするとフルスクリーンでデータを展開</p>
        </div>

        <div class="card control-card">
            <h3>Hormuz Simulation</h3>
            <label>地政学的緊張度: <span id="risk-display">0</span>%</label>
            <input type="range" id="risk-slider" value="0" min="0" max="100">
            
            <div class="price-box">
                <span class="usd-price">予測価格 (USD): <span id="oil-usd">$80.00</span></span>
                <span class="jpy-price" id="oil-jpy">¥12,400</span>
                <small style="color: var(--text-dim);">※1ドル=155円換算</small>
            </div>

            <div style="height: 200px;">
                <canvas id="impactChart"></canvas>
            </div>
        </div>
    </main>

    <script>
        window.onload = function() {
            const EX_RATE = 155;

            // --- インフォグラフィックデータ定義 ---
            const infoData = {
                "権力": {
                    color: "var(--accent)",
                    desc: "アメリカによる中東の「資源」と「秩序」の支配。自国のルールを他国に強いる国際政治的なアドバンテージを指す。この強引な介入姿勢が対立の引き金となる。",
                    graphics: [
                        { label: "アメリカの世界軍事費シェア", val: "39%", width: "39%" },
                        { label: "対中東外交圧力インデックス", val: "85 / 100", width: "85%" }
                    ]
                },
                "力": {
                    color: "var(--danger)",
                    desc: "イランによる防衛的リアクション。世界最悪のチョークポイントである「ホルムズ海峡」という地理的優位性を盾にした、物理的な軍事阻止力および抑止力。",
                    graphics: [
                        { label: "ホルムズ海峡の海上封鎖能力", val: "極めて高い", width: "95%" },
                        { label: "周辺勢力への地政学的抑止力", val: "90 / 100", width: "90%" }
                    ]
                },
                "資源": {
                    color: "var(--resource)",
                    desc: "すべての対立の根本にある「石油」。核問題の裏に隠された本質的なエネルギー安保問題であり、これが脅かされると世界経済全体の秩序が崩壊する。",
                    graphics: [
                        { label: "日本の中東原油依存度", val: "約 92%", width: "92%" },
                        { label: "ホルムズ海峡通過石油の世界シェア", val: "約 21%", width: "21%" }
                    ]
                }
            };

            // --- モーダルアニメーション制御 ---
            const modal = document.getElementById('fs-modal');
            const showFullScreenInfo = (id) => {
                const data = infoData[id];
                document.getElementById('info-dot').style.backgroundColor = data.color;
                document.getElementById('info-title').innerText = id;
                document.getElementById('info-title').style.color = data.color;
                document.getElementById('info-desc').innerText = data.desc;

                // グラフィックの生成
                const container = document.getElementById('graphic-area');
                container.innerHTML = '';
                data.graphics.forEach(g => {
                    const row = document.createElement('div');
                    row.className = 'data-row';
                    row.innerHTML = `
                        <div class="data-label"><span>${g.label}</span><strong>${g.val}</strong></div>
                        <div class="bar-bg"><div class="bar-fill" style="background:${data.color}"></div></div>
                    `;
                    container.appendChild(row);
                    // アニメーション遅延
                    setTimeout(() => {
                        row.querySelector('.bar-fill').style.width = g.width;
                    }, 50);
                });

                modal.classList.add('active');
            };

            const closeModal = () => modal.classList.remove('active');
            document.getElementById('modal-close').onclick = closeModal;
            modal.onclick = (e) => { if(e.target === modal) closeModal(); };

            // --- D3.js ネットワーク描画 ---
            const nodes = [
                { id: "資源", color: "var(--resource)" },
                { id: "力", color: "var(--danger)" },
                { id: "権力", color: "var(--accent)" }
            ];
            const links = [{source:"権力", target:"資源"}, {source:"力", target:"資源"}, {source:"権力", target:"力"}];

            const svg = d3.select("#viz-canvas");
            const width = document.getElementById('canvas-wrapper').clientWidth;
            const height = 450;

            const sim = d3.forceSimulation(nodes)
                .force("link", d3.forceLink(links).id(d => d.id).distance(140))
                .force("charge", d3.forceManyBody().strength(-1200))
                .force("center", d3.forceCenter(width/2, height/2));

            const link = svg.append("g").selectAll("line").data(links).enter().append("line")
                .attr("stroke", "#484f58").attr("stroke-width", 2.5);

            const node = svg.append("g").selectAll("circle").data(nodes).enter().append("circle")
                .attr("r", 45).attr("fill", d => d.color).attr("stroke", "#fff").attr("stroke-width", 2)
                .style("cursor", "pointer")
                .on("click", (e, d) => showFullScreenInfo(d.id))
                .call(d3.drag().on("start", (e,d)=>{ if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
                    .on("drag", (e,d)=>{ d.fx=e.x; d.fy=e.y; })
                    .on("end", (e,d)=>{ if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));

            const label = svg.append("g").selectAll("text").data(nodes).enter().append("text")
                .attr("class", "node-label").text(d => d.id);

            sim.on("tick", () => {
                link.attr("x1", d=>d.source.x).attr("y1", d=>d.source.y).attr("x2", d=>d.target.x).attr("y2", d=>d.target.y);
                node.attr("cx", d=>d.x).attr("cy", d=>d.y);
                label.attr("x", d=>d.x).attr("y", d=>d.y+6);
            });

            // --- Chart.js ---
            const ctx = document.getElementById('impactChart').getContext('2d');
            const chart = new Chart(ctx, {
                type: 'bar', indexAxis: 'y',
                data: { labels: ['価格指数', 'リスク', '国内影響'], datasets: [{ data: [80, 0, 100], backgroundColor: ['#58a6ff', '#f85149', '#3fb950'] }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            document.getElementById('risk-slider').oninput = (e) => {
                const r = parseInt(e.target.value);
                const usd = (80 + (r * 1.5)).toFixed(2);
                const jpy = Math.round(usd * EX_RATE).toLocaleString();
                
                document.getElementById('risk-display').innerText = r;
                document.getElementById('oil-usd').innerText = `$${usd}`;
                document.getElementById('oil-jpy').innerText = `¥${jpy}`;
                
                chart.data.datasets[0].data = [usd, r, 100 + r];
                chart.update();
            };
        };
    </script>
</body>
</html>
