<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Geopolitics Interactive Viewer</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; margin: 0; overflow: hidden; }
        .node { stroke: #fff; stroke-width: 1.5px; cursor: pointer; }
        .link { stroke: #666; stroke-opacity: 0.6; }
        .label { font-size: 14px; fill: #adbac7; pointer-events: none; }
        #info { position: absolute; top: 20px; left: 20px; background: rgba(33, 38, 45, 0.9); padding: 15px; border-radius: 8px; border: 1px solid #30363d; max-width: 300px; }
    </style>
</head>
<body>
    <div id="info">
        <h3>地政学的因果関係</h3>
        <p id="desc">ノードをドラッグして、勢力図を動かしてみろ。</p>
    </div>
    <svg id="viz"></svg>

    <script>
        const width = window.innerWidth;
        const height = window.innerHeight;

        const data = {
            nodes: [
                { id: "アメリカ", group: 1, desc: "資源と秩序を自国の「権力」で支配しようとする姿勢" },
                { id: "イラン", group: 2, desc: "地理（ホルムズ海峡）を利用した防衛" },
                { id: "資源(石油)", group: 3, desc: "中東の主要な利権。核問題より本質的な石油問題" },
                { id: "ホルムズ海峡", group: 4, desc: "世界のエネルギー安保のチョークポイント" },
                { id: "国際問題", group: 5, desc: "国家間の思惑・対立・協力の結果" }
            ],
            links: [
                { source: "アメリカ", target: "資源(石油)", value: 5 },
                { source: "アメリカ", target: "国際問題", value: 3 },
                { source: "イラン", target: "ホルムズ海峡", value: 5 },
                { source: "イラン", target: "国際問題", value: 3 },
                { source: "ホルムズ海峡", target: "資源(石油)", value: 4 }
            ]
        };

        const svg = d3.select("#viz")
            .attr("width", width)
            .attr("height", height);

        const simulation = d3.forceSimulation(data.nodes)
            .force("link", d3.forceLink(data.links).id(d => d.id).distance(150))
            .force("charge", d3.forceManyBody().strength(-500))
            .force("center", d3.forceCenter(width / 2, height / 2));

        const link = svg.append("g")
            .selectAll("line")
            .data(data.links)
            .enter().append("line")
            .attr("class", "link")
            .attr("stroke-width", d => Math.sqrt(d.value) * 2);

        const node = svg.append("g")
            .selectAll("circle")
            .data(data.nodes)
            .enter().append("circle")
            .attr("class", "node")
            .attr("r", 25)
            .attr("fill", d => d.group === 1 ? "#ff7b72" : d.group === 2 ? "#79c0ff" : "#58a6ff")
            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended))
            .on("mouseover", (event, d) => {
                d3.select("#desc").text(d.desc);
            });

        const label = svg.append("g")
            .selectAll("text")
            .data(data.nodes)
            .enter().append("text")
            .attr("class", "label")
            .text(d => d.id);

        simulation.on("tick", () => {
            link.attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);
            node.attr("cx", d => d.x)
                .attr("cy", d => d.y);
            label.attr("x", d => d.x + 30)
                 .attr("y", d => d.y + 5);
        });

        function dragstarted(event) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            event.subject.fx = event.subject.x;
            event.subject.fcy = event.subject.y;
        }
        function dragged(event) {
            event.subject.fx = event.x;
            event.subject.fy = event.y;
        }
        function dragended(event) {
            if (!event.active) simulation.alphaTarget(0);
            event.subject.fx = null;
            event.subject.fy = null;
        }
    </script>
</body>
</html>
