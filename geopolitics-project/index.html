<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Action Plan: Geopolitics Visualization</title>
    <link rel="stylesheet" href="style.css">
    <!-- ライブラリ読み込み -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>Geopolitical Risk Analysis</h1>
        <p>UNIT1: 権力・力・資源による国際問題の可視化</p>
    </header>

    <main class="container">
        <!-- 関係図セクション -->
        <div class="card viz-card">
            <h3>因果構造：三すくみの関係</h3>
            <div id="canvas-wrapper">
                <svg id="viz-canvas"></svg>
            </div>
            <div id="node-info">ノードをドラッグ、またはホバーして詳細を確認</div>
        </div>

        <!-- シミュレーターセクション -->
        <div class="card control-card">
            <h3>Hormuz Simulation</h3>
            <div class="slider-container">
                <label for="risk-slider">地政学的緊張度: <span id="risk-display">10</span>%</label>
                <input type="range" id="risk-slider" value="10" min="0" max="100">
            </div>
            
            <div class="price-box">
                <span class="label">予測原油価格 (WTI):</span>
                <span id="oil-price">$80.00</span>
            </div>

            <div class="chart-wrapper">
                <canvas id="impactChart"></canvas>
            </div>

            <div class="sources">
                <p>Data Sources: EIA (Energy Information Administration), BP Statistical Review, Unit 1 Research.</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
